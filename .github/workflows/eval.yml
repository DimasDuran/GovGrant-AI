name: golden-eval

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (test extras if present)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest
      - name: Unit tests (no Qdrant required)
        run: pytest -q tests/rag -k "not integration" --tb=short
        env:
          CHAT_ENABLED: "false"
          AUTH_ENABLED: "false"

      - name: Thresholds file present
        run: test -f data/eval/THRESHOLDS.json && python -c "from govgrant.rag.eval.gates import load_thresholds; assert 'router' in load_thresholds()['gates']"

  # Full golden gates need Qdrant + Ollama + ingested corpus (self-hosted / local):
  #   ./scripts/run_gates.sh unit
  #   ./scripts/run_gates.sh router
  #   ./scripts/run_gates.sh hard_llm
  #   ./scripts/run_gates.sh checklist_corpus
